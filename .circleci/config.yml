# Use the latest 2.1 version of CircleCI pipeline process engine.
# See: https://circleci.com/docs/configuration-reference
version: 2.1
orbs:
  php: circleci/php@1.1.0
  browser-tools: circleci/browser-tools@1.4.9
  node: circleci/node@6.3.0

# References section
#   @see https://carlalexander.ca/continuous-deployment-wordpress-directory-circleci/
#
references:
  # Environment variables
  #
  WP_CORE_DIR: &WP_CORE_DIR
      /tmp/wordpress
  WP_HOST: &WP_HOST
    open-source-event-calendar.test
  WP_ORG_PLUGIN_NAME: &WP_ORG_PLUGIN_NAME
      open-source-event-calendar
  WP_ORG_USERNAME: &WP_ORG_USERNAME
      digitaldonkey
  WP_VERSION: &WP_VERSION
      latest
  OSEC_RELEASE_FILE: &OSEC_RELEASE_FILE
      /tmp/open-source-event-calendar.tar.gz
  OSEC_RELEASE_WHITE_LIST: &OSEC_RELEASE_WHITE_LIST
        src/
        vendor/
        public/
        language/                             
        open-source-event-calendar.php
        constants.php
        global-functions.php
        constants-local.php.example                    
        composer.json
        composer.lock
        readme.txt
        LICENSE
        DEVELOPERS.md                             
        hooks-and-filters.md
  workspace_root: &workspace_root /tmp

  # Default container configuration
  container_config: &container_config
    docker:
      - image: cimg/php:8.2
    working_directory: ~/open-source-event-calendar
    environment:
      - WP_CORE_DIR: *WP_CORE_DIR
      - WP_HOST: *WP_HOST
      - WP_ORG_PLUGIN_NAME: *WP_ORG_PLUGIN_NAME
      - WP_ORG_USERNAME: *WP_ORG_USERNAME
      - WP_VERSION: *WP_VERSION
      - OSEC_RELEASE_FILE: *OSEC_RELEASE_FILE
      - OSEC_RELEASE_WHITE_LIST: *OSEC_RELEASE_WHITE_LIST

  # Default DB configuration
  #
  database_config: &database_config
    environment:
      MYSQL_ROOT_PASSWORD: wp_ci_root
      MYSQL_USER: wp_ci
      MYSQL_DATABASE: wp_ci
      MYSQL_PASSWORD: wp_ci


  attach_workspace: &attach_workspace
    attach_workspace:
      at: *workspace_root

  copy_vendor: &copy_vendor
    run:
      name: Copy vendor directory
      command: cp -R /tmp/vendor .

  install_subversion: &install_subversion
    run:
      name: Install subversion
      command: sudo apt-get update && sudo apt-get install -y subversion && sudo rm -rf /var/lib/apt/lists/*

# Define a job to be invoked later in a workflow.
# See: https://circleci.com/docs/jobs-steps/#jobs-overview & https://circleci.com/docs/configuration-reference/#jobs
jobs:

  # BUILD
  build:
    <<: *container_config
    steps:
      - *install_subversion
      - checkout
#      - run: php --version
#      - run: node --version
      - run:
          name: Install dependencies
          command: composer install --no-interaction --optimize-autoloader
          # --no-dev Option required for production build
      - persist_to_workspace:
          root: .
          paths:
            - vendor
      - run:
          name: Install WordPress (Test scripts)
          command: bash ./bin/install-wp-tests.sh wp_ci wp_ci wp_ci $WP_HOST $WP_VERSION true false
      - persist_to_workspace:
          root: *workspace_root
          paths:
            - wordpress
            - wordpress-tests-lib

  # STATIC CODE ANALYSE
  static_job:
    <<: *container_config
    steps:
      - checkout
      - *attach_workspace
      - *copy_vendor
      - run:
          name: Run code quality tests
          command: vendor/bin/grumphp run --testsuite=code_quality

  #
  # Default configuration Database testing jobs
  #
  db_job: &db_job
    <<: *container_config
    docker:
      - image: cimg/php:8.2
      - image: cimg/mariadb:11.4
        <<: *database_config
    steps:
      - checkout
      - run:
          name: Add WordPress domain to hosts file
          command: echo "127.0.0.1 ${WP_HOST}" | sudo tee -a /etc/hosts
      - *attach_workspace
      - *copy_vendor
      - run:
          name: Update outdated apt key
          command: (cd /etc/apt/ && sudo cp trusted.gpg trusted.gpg.d/)
      - run:
          name: Install MySQL client and PHP extension
          command: sudo apt-get update
                    && sudo apt-get install -y mysql-client 
                    && sudo rm -rf /var/lib/apt/lists/*
      - run:
          name: Install apcu
          command: sudo mkdir -p /tmp/pear/temp
                    && sudo pecl channel-update pecl.php.net
                    && echo no '' |  sudo pecl install apcu
                    && sudo bash -c "echo 'apc.enable_cli = 1'  >>  /etc/php.d/circleci.ini"
      - run:
          name: Test apcu in PHP.ini
          command: php -i | grep -i apcu
      - run:
          name: Start PHP server
          command: sudo php -S $WP_HOST:80 -t $WP_CORE_DIR
          background: True
      - run:
          name: Run PHP unit tests
          command: |
            set -Eeuxo pipefail
            mkdir -p ~/phpunit          
            vendor/bin/phpunit --log-junit ~/phpunit/junit.xml tests
          when: always
      - store_test_results:
          path: ~/phpunit

#  db_job_maria_10_5:
#    <<: *db_job
#    docker:
#      - image: cimg/php:8.2
#      - image: cimg/mariadb:10.5
#        <<: *database_config
#
#  db_job_maria_11:
#    <<: *db_job
#    docker:
#      - image: cimg/php:8.2
#      - image: cimg/mariadb:11.4
#        <<: *database_config
#
#  db_job_php_8_1:
#    <<: *db_job
#    docker:
#      - image: cimg/php:8.1
#      - image: cimg/mariadb:11.4
#        <<: *database_config
#
#  db_job_php_8_3:
#    docker:
#      - image: cimg/php:8.3
#      - image: cimg/mariadb:11.4
#        <<: *database_config
#
#  db_job_mysql_8:
#    docker:
#      - image: cimg/php:8.2
#      - image: cimg/mysql:8.0
#        <<: *database_config

  #  db_job_php_8_0:
  #    <<: *db_job
  #    docker:
  #      - image: cimg/php:8.0.28
  #      - image: cimg/cimg/mariadb:11.4
  #        <<: *database_config
  # mclay/minify && Grumphp and others require PHP > 8.1.

  create_release_job:
    <<: *container_config
    steps:
      #      - *install_subversion
      - checkout
      - *attach_workspace
      - run:
          name: Install dependencies (no dev)
          command: composer install --no-interaction --optimize-autoloader --no-dev
      - run:
          name: Create Release package
          command: |
            mkdir -p /tmp/release/$WP_ORG_PLUGIN_NAME
            (cd ~/$WP_ORG_PLUGIN_NAME && cp -R $OSEC_RELEASE_WHITE_LIST /tmp/release/$WP_ORG_PLUGIN_NAME)            
            tar -czf $OSEC_RELEASE_FILE -C /tmp/release/ $WP_ORG_PLUGIN_NAME
      - store_artifacts:
          path: /tmp/open-source-event-calendar.tar.gz
      - persist_to_workspace:
          root: *workspace_root
          paths:
            - open-source-event-calendar.tar.gz
  release_test_job:
    <<: *db_job
    docker:
      - image: cimg/php:8.2-browsers
        # php:8.2-apache
        # webdevops/php-apache:8.2
      - image: cimg/mariadb:11.4
        <<: *database_config
    environment:
      # Rewrite environment
      # Standard WP at docroot. Osec release tar goes into wp-plugins.
      - WP_CORE_DIR: /var/www/html # /tmp/docroot
      - WP_HOST: *WP_HOST
      - WP_ORG_PLUGIN_NAME: *WP_ORG_PLUGIN_NAME
      - WP_ORG_USERNAME: *WP_ORG_USERNAME
      - WP_VERSION: *WP_VERSION
      - WP_CLI: /tmp/vendor/bin/wp
      - OSEC_RELEASE_FILE: /tmp/open-source-event-calendar.tar.gz
      - OSEC_RELEASE_WHITE_LIST: *OSEC_RELEASE_WHITE_LIST
    steps:
      - browser-tools/install-chrome
      - checkout
      - *attach_workspace
      # @see https://circleci.com/developer/orbs/orb/circleci/browser-tools
      - run:
          name: Update outdated apt key
          command: (cd /etc/apt/ && sudo cp trusted.gpg trusted.gpg.d/)
      - run:
          name: Install Apache, MySQL client and PHP extension
          command: |
            sudo apt-get update
            sudo add-apt-repository ppa:ondrej/php -y                   
            sudo apt-get install -y mysql-client apache2 apache2-utils php8.2-apcu libapache2-mod-php8.2 php8.2-mysql
            sudo rm -rf /var/lib/apt/lists/*
      - run:
          name: Add WordPress domain to hosts file
          command: echo "127.0.0.1 ${WP_HOST}" | sudo tee -a /etc/hosts
      - run:
          name: Setup webserver
          command: |
            sudo cp .circleci/apache2.conf /etc/apache2/sites-enabled/000-default.conf
            sudo sed -i "s/WP_HOST/${WP_HOST}/g" /etc/apache2/sites-enabled/000-default.conf
            sudo sed -i "1s/^/ServerName localhost\\n /" /etc/apache2/apache2.conf
            sudo a2enmod rewrite
            sudo service apache2 restart
          background: True
#      - run:
#          name: Install apcu
#          command: sudo mkdir -p /tmp/pear/temp
#            && sudo pecl channel-update pecl.php.net
#            && echo no '' |  sudo pecl install apcu
#            && sudo bash -c "echo 'apc.enable_cli = 1'  >>  /etc/php.d/circleci.ini"
      - run:
          name: Release test variables
          command: |
            echo "PHP VERSION:"
            php --version
            echo "APCu:"
            php -i | grep -i "APCu Support"
            echo "NODE VERSION:"
            node --version
            echo "GOOGLE CHROME VERSION:"
            google-chrome --version
            echo "CONSTANTS:"
            echo "WP_CORE_DIR: $WP_CORE_DIR"
            echo "WP_HOST: $WP_HOST"
            echo "WP_ORG_PLUGIN_NAME: $WP_ORG_PLUGIN_NAME"
            echo "WP_VERSION: $WP_VERSION"
            echo "WP_ORG_USERNAME: $WP_ORG_USERNAME"
            echo "WP_CLI: $WP_CLI"
            echo "WP_CLI VERSION:"          
            $WP_CLI --version
      - run:
          name: Add WordPress host to hosts file
          command: echo "127.0.0.1 ${WP_HOST}" | sudo tee -a /etc/hosts
      - run:
          name: Install WordPress (DB, no unit test scripts)
          command: |
            sudo chown root:circleci $WP_CORE_DIR/.. && sudo chmod g+w $WP_CORE_DIR/.. && sudo rm -rf $WP_CORE_DIR 
            bash ./bin/install-wp-tests.sh wp_ci wp_ci wp_ci $WP_HOST $WP_VERSION true true
            $WP_CLI config create --dbname=wp_ci --dbuser=wp_ci --dbpass=wp_ci --path=$WP_CORE_DIR --dbhost=127.0.0.1
            $WP_CLI core install --url=$WP_HOST --title="OSEC" --path=$WP_CORE_DIR --admin_user="admin" --admin_password="password" --admin_email="no-one-cares@about.test.com"
      - run:
          name: Install Open source event calendar plugin (release)
          command: |
            tar -xf $OSEC_RELEASE_FILE -C $WP_CORE_DIR/wp-content/plugins
#      - run:
#          name: Start PHP server
#          command: sudo php -S $WP_HOST:80 -t $WP_CORE_DIR
#          background: True
      - node/install-packages:
          app-dir: integration_tests/
          override-ci-command: npm install
      - run:
          name: Release integratiion test
          command: |
            set -Eeuxo pipefail
            mkdir -p /tmp/integration_test_results/screenshots
            (
              cd integration_tests/ && 
              MOCHA_FILE=/tmp/integration_test_results/mocha-junit.xml \
              MOCHA_SCREENSHOT_DIR=/tmp/integration_test_results/screenshots \
              npx mocha test/**/*.spec.js --timeout 60000
            )
          when: always
      - store_test_results:
          path: /tmp/integration_test_results

# Orchestrate jobs using workflows
# See: https://circleci.com/docs/workflows/
#   & https://circleci.com/docs/configuration-reference/#workflows
workflows:
  build_test_deploy: # This is the name of the workflow, feel free to change it to better match your workflow.
    # Inside the workflow, you define the jobs you want to run.
    jobs:
      - build
      - static_job:
          requires:
            - build
      - db_job:
          requires:
            - build
#      - db_job_maria_10_5:
#          requires:
#            - db_job
#            - static_job
#      - db_job_maria_11:
#          requires:
#            - db_job
#            - static_job
#      - db_job_php_8_1:
#          requires:
#            - db_job
#            - static_job
#      - db_job_mysql_8:
#          requires:
#            - db_job
#            - static_job
      - create_release_job:
          requires:
#            - db_job_php_8_1
#            - db_job_maria_11
#            - db_job_maria_10_5
            - db_job
            - static_job
      - release_test_job:
          requires:
            - create_release_job
